name: Eval

# Per EVAL_SPEC.md: runs on PRs touching skills/** or evals/**, and nightly
# on main. Fails if any skill's pass rate drops by more than 0.05.
#
# Step 2 of BRIEF.md lands the runner (scripts/eval.ts + update-pass-rate.ts).
# Until then, this job short-circuits to green so CI does not block PRs that
# legitimately touch briefing docs in those paths.

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'evals/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  eval:
    name: Run evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check runner presence
        id: runner
        run: |
          if [ -f scripts/eval.ts ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.runner.outputs.ready == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.0

      - name: Install dependencies
        if: steps.runner.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Run eval suite
        if: steps.runner.outputs.ready == 'true'
        run: bun run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Step 2 notice
        if: steps.runner.outputs.ready != 'true'
        run: echo "scripts/eval.ts does not exist yet — lands in Step 2 of BRIEF.md."
