name: Eval

# Per EVAL_SPEC.md § CI behavior: runs on PRs touching skills/** or evals/**,
# and nightly on main. The orchestrator (scripts/eval.ts) writes pass rates
# back into each SKILL.md frontmatter; scripts/validate-skills.ts ensures no
# one hand-edits the three runner-owned fields. Regression gating (fail if
# any skill's pass_rate drops by more than 0.05) lands in a follow-up
# workflow step once baseline pass rates are stable on main.

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'evals/**'
      - 'packages/eval-harness/**'
      - 'scripts/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  eval:
    name: Run evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        # core-web-vitals-audit eval drives Lighthouse via chrome-launcher;
        # Playwright's bundled chromium is the most reliable headless browser
        # on Ubuntu runners.
        run: bunx playwright install --with-deps chromium

      - name: Locate Playwright Chromium
        id: chrome
        # Sets CHROME_PATH for the Lighthouse run. The path is deterministic
        # under ~/.cache/ms-playwright/chromium-*/chrome-linux/chrome.
        run: |
          CHROME="$(find "$HOME/.cache/ms-playwright" -name chrome -type f -path '*chrome-linux*' | head -1)"
          echo "CHROME_PATH=$CHROME" >> "$GITHUB_ENV"
          echo "Resolved chrome: $CHROME"

      - name: Install fixture-app dependencies
        # Each metric-eval fixture has its own node_modules because it
        # simulates a consumer project; install them before the eval runs.
        run: |
          for app in evals/*/fixtures/app; do
            if [ -f "$app/package.json" ]; then
              echo "Installing $app"
              (cd "$app" && bun install --frozen-lockfile)
            fi
          done

      - name: Run eval suite
        run: bun run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
