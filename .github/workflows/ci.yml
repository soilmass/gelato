name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Biome
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Needs to be ≥ 1.2 to read the text bun.lock format that ships
          # under Bun 1.2+ (older versions only read bun.lockb binary).
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bunx biome ci .

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Validate skill frontmatter
        run: bun run validate

      # Eval smoke test lands once scripts/eval.ts is complete:
      # - name: Eval smoke test
      #   run: bun run eval --smoke

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: semgrep ci --config=p/javascript --config=p/typescript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
