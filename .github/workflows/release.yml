name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  # Releases must NOT be cancelled mid-flight — queue new runs instead so
  # each main commit gets a chance to produce a version PR.
  cancel-in-progress: false

jobs:
  release:
    name: Version PR via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Changesets — create version PR
        # v0.2.0 still does not publish to npm — the workspace packages
        # (@gelato/schema, @gelato/eval-harness) remain `private: true`.
        # Publishing lands in a follow-up release; this step just bumps
        # versions via Changesets.
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
