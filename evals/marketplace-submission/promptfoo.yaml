description: marketplace-submission LLM-as-judge rubric

providers:
  - anthropic:messages:claude-sonnet-4-5-20250929

defaultTest:
  options:
    cache: true

prompts:
  - |
    The following is a review of a candidate `.claude-plugin/marketplace.json`
    against Anthropic's Plugin Marketplaces reference. Judge whether the
    review identifies each violation, cites the Plugin Marketplaces
    reference, and gives actionable fixes.

    ---
    {{content}}
    ---

tests:
  - description: marketplace-submission-thoroughness
    vars:
      content: |
        Violations in candidate `.claude-plugin/marketplace.json`:

        1. `marketplace-plugin-duplicate-name` (Plugin Marketplaces
           reference § Plugin entries — Required fields). Two entries
           share `"name": "formatter"`. The marketplace `/plugin install
           formatter@my-tools` would resolve ambiguously. Fix: rename the
           second entry (e.g. `"formatter-enterprise"`).

        2. `marketplace-plugin-source-path-traversal` (Plugin Marketplaces
           reference § Relative paths — "Do not use `../` to reference
           paths outside the marketplace root"). Plugin `shared` sets
           `"source": "../sibling-repo/plugin"`. Fix: move the plugin
           under the marketplace repo, use a `github` source, or use
           `git-subdir` for monorepos.

        No other schema-level errors.
    assert:
      - type: llm-rubric
        value: |
          Score 0.0 to 1.0. Return 1 when the review:
            - names each violation class by its Gelato identifier
            - cites the Anthropic Plugin Marketplaces reference as the source
            - gives a copy-pasteable fix per violation
            - does NOT invent rules not present in the Plugin Marketplaces reference
          Score 0.5 when the review lists violations but skips
          citations or concrete fixes.
          Score 0 when a violation is misclassified, a non-existent
          rule is cited, or a stated violation is skipped.
