description: next-image-font-script LLM-as-judge rubric

providers:
  - anthropic:messages:claude-sonnet-4-5-20250929

defaultTest:
  options:
    cache: true

prompts:
  - |
    The following is a remediation for a next-image-font-script
    violation in a Next.js 15 App Router codebase. Judge whether
    the fix satisfies the Next.js docs contract for the cited
    asset component.

    ---
    {{content}}
    ---

tests:
  - description: asset-remediation-implementability
    vars:
      content: |
        Violation class: no-priority-on-lcp

        Rule cited: Next.js next/image docs — the LCP candidate
        on a page should carry the `priority` prop. Without it,
        Next lazy-loads all images by default, which hurts the
        Largest Contentful Paint metric.

        Original:
          // app/marketing/page.tsx
          import Image from 'next/image';

          export default function Page() {
            return (
              <section>
                <Image src="/hero.jpg" alt="Hero" width={1200} height={600} />
                <Image src="/thumb.png" alt="" width={100} height={100} />
              </section>
            );
          }

        Fix: add `priority` to the above-the-fold hero image
        (the LCP candidate). Thumbs remain default (lazy).

          // app/marketing/page.tsx
          import Image from 'next/image';

          export default function Page() {
            return (
              <section>
                <Image
                  src="/hero.jpg"
                  alt="Hero"
                  width={1200}
                  height={600}
                  priority
                />
                <Image
                  src="/thumb.png"
                  alt=""
                  width={100}
                  height={100}
                />
              </section>
            );
          }

        Why it satisfies the rule:
          - Exactly one Image per page is marked priority — the
            LCP candidate, which Next eager-loads.
          - Remaining images stay lazy by default, which is
            correct for below-the-fold content.
          - No other prop contracts change; width/height remain;
            alt remains.
    assert:
      - type: llm-rubric
        value: |
          Score 0.0 to 1.0. Return 1 when the remediation:
            - cites the Next.js next/image docs (priority + LCP)
            - shows the corrected page in full
            - adds priority to one image (not to all of them)
            - does not remove existing alt, width, or height props
            - explains the LCP-candidate identification
          Score 0.5 when the fix adds priority correctly but
          omits the citation or the rationale for which image.
          Score 0 when priority is added to all images, or the
          fix introduces a new violation (missing dims,
          switching to a bare <img>, etc.).
