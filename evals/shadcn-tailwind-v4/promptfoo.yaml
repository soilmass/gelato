# Promptfoo config for shadcn-tailwind-v4 LLM-as-judge rubrics.
#
# One rubric per SKILL.md § Evaluation:
#   - cva-idiom — judges whether variant-branching structures use
#     `cva` cleanly (variants table, defaultVariants) rather than a
#     hand-written `if` ladder, and whether the Radix primitive
#     choice (if any) matches the shadcn component's canonical shape.

description: shadcn-tailwind-v4 LLM-as-judge rubrics

providers:
  - anthropic:messages:claude-sonnet-4-5-20250929

defaultTest:
  options:
    cache: true

prompts:
  - |
    The following is a shadcn/ui-style component in a Tailwind v4
    Next.js 15 codebase. Assess whether variant branching uses `cva`
    idiomatically rather than a hand-written if-ladder, and whether
    the Radix primitive choice (if present) matches the canonical
    shadcn shape.

    ---
    {{content}}
    ---

tests:
  - description: cva-idiom
    vars:
      content: |
        // components/ui/button.tsx
        import * as React from 'react';
        import { Slot } from '@radix-ui/react-slot';
        import { cva, type VariantProps } from 'class-variance-authority';
        import { cn } from '@/lib/utils';

        const buttonVariants = cva(
          'inline-flex items-center justify-center rounded-md text-sm font-medium',
          {
            variants: {
              variant: {
                default: 'bg-primary text-primary-foreground hover:bg-primary/90',
                destructive: 'bg-destructive text-destructive-foreground hover:bg-destructive/90',
                outline: 'border border-input bg-background hover:bg-accent',
                ghost: 'hover:bg-accent hover:text-accent-foreground',
                link: 'text-primary underline-offset-4 hover:underline',
              },
              size: {
                default: 'h-10 px-4 py-2',
                sm: 'h-9 px-3',
                lg: 'h-11 px-8',
                icon: 'h-10 w-10',
              },
            },
            defaultVariants: { variant: 'default', size: 'default' },
          },
        );

        export interface ButtonProps
          extends React.ButtonHTMLAttributes<HTMLButtonElement>,
            VariantProps<typeof buttonVariants> {
          asChild?: boolean;
        }

        export const Button = React.forwardRef<HTMLButtonElement, ButtonProps>(
          ({ className, variant, size, asChild = false, ...props }, ref) => {
            const Comp = asChild ? Slot : 'button';
            return (
              <Comp
                ref={ref}
                className={cn(buttonVariants({ variant, size }), className)}
                {...props}
              />
            );
          },
        );
        Button.displayName = 'Button';
    assert:
      - type: llm-rubric
        value: |
          Score 0.0 to 1.0. Return 1 when the component:
            - routes variant branching through `cva(base, { variants,
              defaultVariants })` — one source of truth for variants,
              not an inline if / switch ladder
            - exposes VariantProps<typeof cvaCall> on the component's
              prop interface so the variants are type-safe at the
              call site
            - applies cva via `cn(cvaCall({...}), className)` so
              user-passed className can still override
            - (when a Radix primitive is used) chooses the canonical
              primitive for the shadcn component (e.g. @radix-ui/
              react-slot for polymorphic `asChild`, react-dialog for
              Dialog, react-dropdown-menu for DropdownMenu)
          Score 0 when variants live in an inline if / switch ladder
          with no cva, OR when cn() is absent and the className prop
          can't override. Score 0.5 when cva is used but
          VariantProps isn't piped through, or when the Radix
          primitive choice is non-canonical.
